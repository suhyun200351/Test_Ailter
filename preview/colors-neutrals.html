<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#fff;font-family:var(--font-body);color:var(--text);padding:24px;}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
  .chip{display:flex;flex-direction:column;gap:8px}
  .sw{width:104px;height:60px;border-radius:10px;border:1px solid rgba(0,0,0,.06)}
  .nm{font-size:12px;font-weight:600;letter-spacing:-.01em;color:var(--text)}
  .vl{font-size:11px;color:var(--text-muted);font-family:ui-monospace,Menlo,monospace}
  .cap{font-size:11px;color:var(--text-muted);font-family:ui-monospace,Menlo,monospace;margin-top:2px}
  
</style></head><body><div class="row">
<div class="chip"><div class="sw" style="background:var(--gray-000)"></div><div class="nm">surface</div><div class="vl">#FFFFFF</div></div>
<div class="chip"><div class="sw" style="background:var(--gray-050)"></div><div class="nm">canvas</div><div class="vl">rgb(249,250,251)</div></div>
<div class="chip"><div class="sw" style="background:var(--gray-100)"></div><div class="nm">border</div><div class="vl">rgb(233,235,239)</div></div>
<div class="chip"><div class="sw" style="background:var(--gray-400)"></div><div class="nm">text·disabled</div><div class="vl">rgb(170,172,180)</div></div>
<div class="chip"><div class="sw" style="background:var(--gray-600)"></div><div class="nm">text·muted</div><div class="vl">rgb(111,113,124)</div></div>
<div class="chip"><div class="sw" style="background:var(--gray-900)"></div><div class="nm">text</div><div class="vl">rgb(30,30,30)</div></div>
</div></body></html>
