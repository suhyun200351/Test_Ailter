<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#fff;font-family:var(--font-body);color:var(--text);padding:24px;}
  .row{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end}
  .item{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
  .nm{font-size:12px;font-weight:600}
  .vl{font-size:11px;color:var(--text-muted);font-family:ui-monospace,Menlo,monospace}
  .box{width:96px;height:60px;background:var(--accent-tint);border:1px solid var(--accent)}
</style></head><body><div class="row">
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="nm">--r-sm</div><div class="vl">4px · icon hit-area</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="nm">--r-md</div><div class="vl">8px · social buttons</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="nm">--r-lg</div><div class="vl">12px · rows & CTA</div></div>
</div></body></html>
