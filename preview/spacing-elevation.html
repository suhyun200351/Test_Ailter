<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#fff;font-family:var(--font-body);color:var(--text);padding:24px;}
  .row{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end}
  .item{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
  .nm{font-size:12px;font-weight:600}
  .vl{font-size:11px;color:var(--text-muted);font-family:ui-monospace,Menlo,monospace}
  .box{width:130px;height:74px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted)}
</style></head><body><div class="row" style="background:var(--bg);margin:-24px;padding:34px 24px;">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sticker)">sticker</div><div class="vl">0 4px 22.7px rgba(0,0,0,.14)</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-button);border:1px solid var(--border)">button</div><div class="vl">0 1px 2px rgba(0,0,0,.05)</div></div>
  <div class="item"><div class="box" style="border:1px solid var(--border)">border-only</div><div class="vl">1px rgb(233,235,239)</div></div>
</div></body></html>
