<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#fff;font-family:var(--font-body);color:var(--text);padding:24px;}
  .row{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end}
  .item{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
  .nm{font-size:12px;font-weight:600}
  .vl{font-size:11px;color:var(--text-muted);font-family:ui-monospace,Menlo,monospace}
  .tok{display:flex;flex-direction:column;gap:6px}.bar{background:var(--accent);height:12px;border-radius:6px}.lbl{font-size:12px;font-weight:600}.sub{font-size:11px;color:var(--text-muted);font-family:ui-monospace,Menlo,monospace}
</style></head><body>
  <div style="display:flex;flex-direction:column;gap:16px;max-width:560px">
    <div class="tok"><div class="bar" style="width:20px"></div><div class="lbl">--gutter · 20px <span class="sub">screen edges</span></div></div>
    <div class="tok"><div class="bar" style="width:16px"></div><div class="lbl">--gap-options · 16px <span class="sub">between rows</span></div></div>
    <div class="tok"><div class="bar" style="width:12px"></div><div class="lbl">--gap-buttons · 12px <span class="sub">between logins</span></div></div>
    <div class="sub" style="margin-top:6px">heights — social 52 · row/CTA 56 · icon-btn 36</div>
  </div></body></html>
