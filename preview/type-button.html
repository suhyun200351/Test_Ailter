<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#fff;font-family:var(--font-body);color:var(--text);padding:24px;}
  .cap{font-size:11px;color:var(--text-muted);font-family:ui-monospace,Menlo,monospace;margin-top:6px}
  .specimen{display:flex;flex-direction:column;gap:18px}
  .line{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
  .meta{font-size:11px;color:var(--text-muted);font-family:ui-monospace,Menlo,monospace}
  .bt{font-family:var(--font-button);font-weight:500;font-size:14px;letter-spacing:-.016em;color:var(--text)}
</style></head><body><div class="specimen">
  <div class="line"><span class="bt">카카오로 시작하기</span><span class="bt">구글로 시작하기</span><span class="bt">다음</span></div>
  <div class="meta">SUIT · Medium (500) · 14px · −0.016em — social-button & CTA labels</div>
</div></body></html>
