<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#fff;font-family:var(--font-body);color:var(--text);padding:24px;}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
  .chip{display:flex;flex-direction:column;gap:8px}
  .sw{width:104px;height:60px;border-radius:10px;border:1px solid rgba(0,0,0,.06)}
  .nm{font-size:12px;font-weight:600;letter-spacing:-.01em;color:var(--text)}
  .vl{font-size:11px;color:var(--text-muted);font-family:ui-monospace,Menlo,monospace}
  .cap{font-size:11px;color:var(--text-muted);font-family:ui-monospace,Menlo,monospace;margin-top:2px}
  
</style></head><body><div class="row">
<div class="chip"><div class="sw" style="background:var(--kakao-yellow)"></div><div class="nm">Kakao</div><div class="vl">rgb(249,224,0)</div></div>
<div class="chip"><div class="sw" style="background:var(--apple-chip)"></div><div class="nm">Apple chip</div><div class="vl">rgb(233,235,239)</div></div>
<div class="chip"><div class="sw" style="background:var(--kakao-brown)"></div><div class="nm">Kakao brown</div><div class="vl">#3A1D1D</div></div>
<div class="chip"><div class="sw" style="background:var(--tomato-grad)"></div><div class="nm">Mascot body</div><div class="vl">gradient</div></div>
<div class="chip"><div class="sw" style="background:var(--stem-grad)"></div><div class="nm">Mascot stem</div><div class="vl">gradient</div></div>
</div></body></html>
